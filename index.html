<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>邏輯猜燈謎 (5燈4色)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 防止手機端點擊閃爍與雙擊放大 */
        .no-tap-highlight { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        /* 隱藏卷軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] overflow-hidden flex flex-col items-center justify-center">
    
    <!-- 遊戲主要容器 (限制最大寬度，讓電腦版看起來也像手機 App) -->
    <div class="bg-white w-full max-w-md h-full sm:h-[90vh] sm:rounded-2xl sm:shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- 頂部標題列 -->
        <div class="bg-slate-800 text-white p-4 flex justify-between items-center z-10 shadow-md">
            <h1 class="text-lg font-bold">邏輯猜燈謎 <span class="text-xs text-slate-300 font-normal ml-1">(4色5燈)</span></h1>
            <button onclick="initGame()" class="text-sm bg-slate-600 hover:bg-slate-500 px-3 py-1 rounded transition">重新開始</button>
        </div>

        <!-- 歷史紀錄區 (可滾動) -->
        <div id="history-container" class="flex-1 overflow-y-auto p-4 bg-slate-50 no-scrollbar pb-32">
            <div id="history" class="flex flex-col gap-3">
                <!-- 猜測紀錄會用 JS 動態插入在這裡 -->
                <div class="text-center text-gray-400 mt-10 text-sm" id="empty-state">
                    點擊下方的燈泡切換顏色，<br>選好後點擊「確認猜測」！
                </div>
            </div>
        </div>

        <!-- 底部輸入區 (固定在下方) -->
        <div class="absolute bottom-0 w-full bg-white border-t border-gray-200 p-4 pb-6 sm:pb-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
            <div class="flex justify-between items-center mb-4 px-2" id="input-row">
                <!-- 5個輸入燈泡 -->
                <div onclick="cycleColor(0)" id="guess-0" class="no-tap-highlight w-12 h-12 rounded-full cursor-pointer shadow-inner border-4 border-gray-100 transition-colors duration-200"></div>
                <div onclick="cycleColor(1)" id="guess-1" class="no-tap-highlight w-12 h-12 rounded-full cursor-pointer shadow-inner border-4 border-gray-100 transition-colors duration-200"></div>
                <div onclick="cycleColor(2)" id="guess-2" class="no-tap-highlight w-12 h-12 rounded-full cursor-pointer shadow-inner border-4 border-gray-100 transition-colors duration-200"></div>
                <div onclick="cycleColor(3)" id="guess-3" class="no-tap-highlight w-12 h-12 rounded-full cursor-pointer shadow-inner border-4 border-gray-100 transition-colors duration-200"></div>
                <div onclick="cycleColor(4)" id="guess-4" class="no-tap-highlight w-12 h-12 rounded-full cursor-pointer shadow-inner border-4 border-gray-100 transition-colors duration-200"></div>
            </div>
            <button onclick="submitGuess()" id="submit-btn" class="w-full bg-blue-600 active:bg-blue-800 text-white font-bold py-3 rounded-xl shadow-md transition-transform transform active:scale-[0.98] text-lg">
                確認猜測
            </button>
        </div>
        
        <!-- 通關覆蓋層 -->
        <div id="win-screen" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm z-30 flex flex-col items-center justify-center">
            <h2 class="text-4xl font-black text-green-600 mb-2">過關！</h2>
            <p id="win-stats" class="text-lg text-gray-700 mb-6"></p>
            <button onclick="initGame()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition">再來一局</button>
        </div>
    </div>

    <script>
        // 設定 4 種顏色 (對應 Tailwind 的顏色 class)
        // 0: 紅, 1: 黃, 2: 藍, 3: 綠
        const colors = ['bg-red-500', 'bg-yellow-400', 'bg-green-500', 'bg-blue-500', ];
        
        let secretAnswer = [];
        let currentGuess = [0, 0, 0, 0, 0]; // 預設全部為紅色
        let attempts = 0;
        let gameOver = false;

        function initGame() {
            // 隨機產生 5 個 0~3 的數字作為答案
            secretAnswer = Array.from({length: 5}, () => Math.floor(Math.random() * 4));
            currentGuess = [0, 0, 0, 0, 0];
            attempts = 0;
            gameOver = false;
            
            // 重置 UI
            document.getElementById('history').innerHTML = '';
            document.getElementById('win-screen').classList.add('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').classList.remove('opacity-50');
            
            updateInputUI();
            
            // 如果你想作弊看答案，可以把下面這行的註解拿掉打開 F12
            // console.log("解答:", secretAnswer); 
        }

        // 切換燈泡顏色
        function cycleColor(index) {
            if (gameOver) return;
            currentGuess[index] = (currentGuess[index] + 1) % 4; // 0,1,2,3 循環
            updateInputUI();
        }

        // 更新下方輸入區的顏色
        function updateInputUI() {
            for(let i = 0; i < 5; i++) {
                const el = document.getElementById(`guess-${i}`);
                // 移除舊的顏色
                colors.forEach(c => el.classList.remove(c));
                // 加上新的顏色
                el.classList.add(colors[currentGuess[i]]);
            }
        }

        // 送出猜測
        function submitGuess() {
            if (gameOver) return;

            // 1. 隱藏初始提示文字
            const emptyState = document.getElementById('empty-state');
            if(emptyState) emptyState.remove();

            attempts++;

            // 2. 計算全對的數量
            let correctCount = 0;
            for(let i = 0; i < 5; i++) {
                if(currentGuess[i] === secretAnswer[i]) {
                    correctCount++;
                }
            }

            // 3. 建立歷史紀錄的 UI 元素
            const historyDiv = document.getElementById('history');
            const row = document.createElement('div');
            row.className = 'flex items-center justify-between p-3 bg-white rounded-xl shadow-[0_2px_4px_rgba(0,0,0,0.04)] border border-gray-100 animate-[slideDown_0.2s_ease-out]';
            
            // 左側：這次猜的顏色
            const circlesDiv = document.createElement('div');
            circlesDiv.className = 'flex space-x-1 sm:space-x-2';
            for(let i = 0; i < 5; i++) {
                const circle = document.createElement('div');
                circle.className = `w-7 h-7 sm:w-8 sm:h-8 rounded-full shadow-inner ${colors[currentGuess[i]]}`;
                circlesDiv.appendChild(circle);
            }

            // 右側：結果與次數
            const scoreDiv = document.createElement('div');
            scoreDiv.className = 'flex items-center space-x-3';
            scoreDiv.innerHTML = `
                <span class="text-xs text-gray-400 font-mono">#${attempts.toString().padStart(2, '0')}</span>
                <span class="font-bold text-slate-700 text-lg sm:text-xl w-12 text-right">${correctCount} 對</span>
            `;

            row.appendChild(circlesDiv);
            row.appendChild(scoreDiv);
            
            // 將最新的紀錄插到最上面
            historyDiv.prepend(row);

            // 4. 判斷是否過關
            if(correctCount === 5) {
                gameOver = true;
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').classList.add('opacity-50');
                
                setTimeout(() => {
                    document.getElementById('win-stats').innerText = `你總共嘗試了 ${attempts} 次！`;
                    document.getElementById('win-screen').classList.remove('hidden');
                }, 300);
            }
        }

        // 初始化遊戲
        initGame();
    </script>
    
    <!-- 簡單的動畫效果 -->
    <style>
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
